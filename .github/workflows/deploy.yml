name: Build & Deploy

on:
  push:
    branches: [ production ]

env:
  REGISTRY: registry.mymemory.com.br/mymemory-vetor

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Build das imagens e push para o registry
  # ─────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no registry
        uses: docker/login-action@v3
        with:
          registry: registry.mymemory.com.br
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build e push — API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/api:latest
            ${{ env.REGISTRY }}/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build e push — Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/web:latest
            ${{ env.REGISTRY }}/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────────────────────
  # 2. Deploy no servidor via SSH
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Atualizar containers no servidor
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            export IMAGE_TAG=${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
