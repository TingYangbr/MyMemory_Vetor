server {
    listen 80;
    server_name _;

    # Limite para uploads de até 100 MB (limite da API)
    client_max_body_size 110m;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy para a API e para mídia local armazenada no container api
    location ~ ^/(api|media)/ {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sem timeout curto — OCR, transcrição e vision podem levar minutos
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
        proxy_connect_timeout 75s;
    }

    # SPA — roteamento client-side do React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
