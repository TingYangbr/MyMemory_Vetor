services:
  dwg-converter:
    build: ./dwg-converter
    container_name: mymemory-dwg-converter
    restart: unless-stopped
    ports:
      - "3010:3010"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: mymemory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mymemory
      POSTGRES_USER: mymemory
      POSTGRES_PASSWORD: mymemory_secret
    ports:
      - "5432:5432"
    volumes:
      - mymemory_pg_data:/var/lib/postgresql/data

volumes:
  mymemory_pg_data:
